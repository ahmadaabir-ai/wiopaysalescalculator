<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wio Pay Sales Calculator</title>
  <style>
/* Wio Pay Sales Calculator — design tokens from reference/DESIGN-SPEC.md */

:root {
  --brand-primary:   #5700ff;
  --brand-secondary: #0f1a38;
  --brand-accent:    #f7d7d0;
  --brand-neutral:   #f2f1ed;

  --indigo-900: #4700e0;
  --indigo-800: #5700ff;
  --indigo-50:  #e8d9ff;
  --indigo-20:  #f4eeff;
  --indigo-10:  #eee6fe;

  --midnight-900: #0f1a38;
  --midnight-600: #5f667a;
  --midnight-300: #c8ccd4;
  --midnight-100: #e6e8ed;
  --midnight-50:  #e1e2e5;
  --midnight-10:  #f5f5f7;

  --green-800: #1f9369;
  --green-50:  #e6faf2;
  --red-800:   #e8023c;
  --red-50:    #ffe0e8;
  --yellow-800:#f9d100;
  --yellow-100:#fdf2ca;

  --stroke-primary: var(--midnight-50);
  --fg-default: var(--midnight-900);
  --fg-mild:    var(--midnight-600);

  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-pill: 999px;

  --elev-1: 0 1px 2px rgba(15,26,56,.04), 0 1px 1px rgba(15,26,56,.04);
  --elev-2: 0 4px 12px rgba(15,26,56,.06), 0 1px 2px rgba(15,26,56,.04);
  --elev-3: 0 12px 32px rgba(15,26,56,.10), 0 2px 6px rgba(15,26,56,.06);

  --font-body: 'Wio Grotesk App', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-head: 'Aktiv Grotesk App', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--brand-neutral);
  color: var(--fg-default);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 22px;
}

code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; }

.app-header {
  background: #fff;
  border-bottom: 1px solid var(--stroke-primary);
  position: sticky; top: 0; z-index: 10;
}
.app-header__inner {
  max-width: 1440px; margin: 0 auto;
  display: flex; align-items: center; gap: 32px;
  padding: 12px 24px; height: 64px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand__mark {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  background: var(--brand-primary); color: #fff;
  display: grid; place-items: center; font-family: var(--font-head); font-weight: 700; font-size: 20px;
}
.brand__title {
  font-family: var(--font-head); font-weight: 500; font-size: 20px; color: var(--brand-secondary);
}

.tabs { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
.tab {
  border: 0; background: transparent;
  height: 40px; padding: 0 16px;
  border-radius: var(--radius-pill);
  color: var(--fg-mild);
  font-family: var(--font-head); font-weight: 500; font-size: 14px;
  cursor: pointer;
}
.tab:hover { background: var(--midnight-10); color: var(--fg-default); }
.tab.is-active { background: var(--brand-primary); color: #fff; }

.app-main { max-width: 1440px; margin: 0 auto; padding: 24px; }
.app-footer { text-align: center; color: var(--fg-mild); font-size: 12px; padding: 24px; }

.panel { display: none; }
.panel.is-active { display: block; }

.split {
  display: grid;
  grid-template-columns: minmax(320px, 380px) 1fr;
  gap: 24px;
}
@media (max-width: 960px) { .split { grid-template-columns: 1fr; } }

.card {
  background: #fff;
  border: 1px solid var(--stroke-primary);
  border-radius: var(--radius-md);
  box-shadow: var(--elev-1);
  padding: 20px;
}
.card + .card { margin-top: 12px; }
.card__title {
  font-family: var(--font-head); font-weight: 500; font-size: 18px; line-height: 22px;
  margin: 0 0 2px;
}
.card__subtitle { color: var(--fg-mild); font-size: 13px; margin: 0 0 12px; }

.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.subsection {
  margin: 14px 0 8px;
  padding-top: 12px;
  border-top: 1px solid var(--stroke-primary);
  font-family: var(--font-head); font-weight: 500;
  font-size: 11px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--fg-mild);
}
.subsection:first-child { margin-top: 0; padding-top: 0; border-top: 0; }
.field__label { font-size: 12px; color: var(--fg-mild); font-family: var(--font-head); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.field__hint { font-size: 12px; color: var(--fg-mild); }

.input, .select {
  height: 44px;
  border: 1px solid var(--stroke-primary);
  border-radius: var(--radius-sm);
  background: #fff;
  padding: 0 12px;
  font-family: var(--font-body); font-size: 16px;
  color: var(--fg-default);
  width: 100%;
}
.input:focus, .select:focus {
  outline: 2px solid var(--brand-primary);
  outline-offset: -1px;
  border-color: var(--brand-primary);
}

.input--lg {
  height: 56px; font-size: 28px; font-family: var(--font-head); font-weight: 500;
  letter-spacing: -0.5px;
}

.chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  border: 1px solid var(--stroke-primary);
  background: #fff;
  border-radius: var(--radius-pill);
  height: 32px;
  padding: 0 14px;
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font-head); font-weight: 500;
  color: var(--fg-default);
}
.chip:hover { background: var(--midnight-10); }
.chip.is-active {
  background: var(--indigo-10);
  color: var(--brand-primary);
  border-color: var(--brand-primary);
}

.toggle-row { display: flex; align-items: center; gap: 10px; }

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 540px) { .row-2 { grid-template-columns: 1fr; } }

.slider { width: 100%; accent-color: var(--brand-primary); }

.verdict {
  display: flex; align-items: center; gap: 16px;
  border-radius: var(--radius-md); padding: 16px 20px;
  font-family: var(--font-head); font-weight: 500;
}
.verdict__dot { width: 12px; height: 12px; border-radius: 999px; flex: 0 0 12px; }
.verdict__label { font-size: 18px; }
.verdict__detail { font-size: 13px; color: var(--fg-mild); font-family: var(--font-body); font-weight: 400; margin-top: 2px; }
.verdict--pos  { background: var(--green-50);    color: var(--green-800); }
.verdict--pos  .verdict__dot { background: var(--green-800); }
.verdict--warn { background: var(--indigo-20);   color: var(--indigo-900); }
.verdict--warn .verdict__dot { background: var(--indigo-900); }
.verdict--cond { background: var(--yellow-100);  color: var(--midnight-900); }
.verdict--cond .verdict__dot { background: var(--yellow-800); }
.verdict--neg  { background: var(--red-50);      color: var(--red-800); }
.verdict--neg  .verdict__dot { background: var(--red-800); }

.alert {
  background: var(--red-50); color: var(--red-800);
  border-radius: var(--radius-sm); padding: 12px 14px;
  font-size: 14px; margin-top: 12px;
  border: 1px solid rgba(232,2,60,.15);
}

.kpis {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  margin-top: 16px;
}
.kpi {
  background: #fff; border: 1px solid var(--stroke-primary);
  border-radius: var(--radius-md); padding: 14px 16px;
  display: flex; flex-direction: column; gap: 4px;
}
.kpi__label { font-size: 12px; color: var(--fg-mild); text-transform: uppercase; letter-spacing: .04em; font-family: var(--font-head); font-weight: 500; }
.kpi__value { font-size: 22px; font-family: var(--font-head); font-weight: 500; color: var(--brand-secondary); letter-spacing: -0.5px; }
.kpi__value.neg { color: var(--red-800); }
.kpi__hint  { font-size: 12px; color: var(--fg-mild); }

.waterfall { margin-top: 12px; }
.waterfall__row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px dashed var(--midnight-50);
  font-size: 14px;
}
.waterfall__row:last-child { border-bottom: 0; font-weight: 500; font-family: var(--font-head); }
.waterfall__row .neg { color: var(--red-800); }
.waterfall__label { color: var(--fg-mild); }
.waterfall__value { font-family: var(--font-head); font-weight: 500; }

.paths {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  margin-top: 12px;
}
.path-card {
  background: var(--indigo-20);
  border: 1px solid var(--indigo-50);
  border-radius: var(--radius-md);
  padding: 16px;
}
.path-card__name { font-family: var(--font-head); font-weight: 500; font-size: 14px; color: var(--indigo-900); margin-bottom: 6px; }
.path-card__aed  { font-family: var(--font-head); font-weight: 500; font-size: 22px; color: var(--brand-secondary); letter-spacing: -0.5px; }
.path-card__hint { font-size: 12px; color: var(--fg-mild); margin-top: 4px; }

.byo-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  margin-top: 12px;
}
.byo {
  display: flex; flex-direction: column; gap: 4px;
  padding: 12px; background: var(--midnight-10);
  border-radius: var(--radius-sm);
}
.byo__label { font-size: 12px; color: var(--fg-mild); text-transform: uppercase; letter-spacing: .04em; }
.byo__rev { font-size: 12px; color: var(--fg-mild); }

.byo-status {
  margin-top: 12px; padding: 12px; border-radius: var(--radius-sm);
  font-size: 14px;
}
.byo-status.is-ok { background: var(--green-50); color: var(--green-800); }
.byo-status.is-bad { background: var(--red-50); color: var(--red-800); }

.loan-matrix { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
.loan-matrix th, .loan-matrix td {
  padding: 8px 10px; border-bottom: 1px solid var(--midnight-50); text-align: right;
}
.loan-matrix th { font-family: var(--font-head); font-weight: 500; color: var(--fg-mild); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
.loan-matrix th:first-child, .loan-matrix td:first-child { text-align: left; }
.loan-matrix tr.is-active td { background: var(--indigo-10); font-weight: 500; }

.pitch {
  background: var(--brand-secondary); color: #fff;
  border-radius: var(--radius-md); padding: 20px;
  margin-top: 16px;
}
.pitch__title { font-family: var(--font-head); font-weight: 500; font-size: 16px; margin-bottom: 6px; opacity: .8; text-transform: uppercase; letter-spacing: .06em; }
.pitch__body  { font-size: 16px; line-height: 24px; }

.backend-section { margin-bottom: 24px; }
.backend-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.backend-table th, .backend-table td {
  padding: 8px 10px; border-bottom: 1px solid var(--midnight-50); text-align: left;
}
.backend-table th { font-family: var(--font-head); font-weight: 500; color: var(--fg-mild); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
.backend-table input {
  height: 32px; padding: 0 8px; width: 110px;
  border: 1px solid var(--stroke-primary); border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 14px;
}

.btn {
  height: 40px; padding: 0 16px;
  border: 0; border-radius: var(--radius-sm);
  font-family: var(--font-head); font-weight: 500; font-size: 14px;
  cursor: pointer;
}
.btn--primary { background: var(--brand-primary); color: #fff; }
.btn--primary:hover { background: var(--indigo-900); }
.btn--ghost { background: transparent; color: var(--brand-primary); }

.toolbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 16px; }

.muted { color: var(--fg-mild); }
.neg   { color: var(--red-800); }
.pos   { color: var(--green-800); }
.mono  { font-variant-numeric: tabular-nums; }
.section-label {
  font-family: var(--font-head); font-weight: 500; font-size: 12px;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--fg-mild);
  margin: 24px 0 8px;
}

/* Manual Calculator sub-tab strip */
.subtabs {
  display: flex; gap: 4px; flex-wrap: wrap;
  background: #fff; border: 1px solid var(--stroke-primary);
  border-radius: var(--radius-pill); padding: 4px;
  width: fit-content; margin-bottom: 16px;
}
.subtab {
  border: 0; background: transparent;
  height: 36px; padding: 0 18px;
  border-radius: var(--radius-pill);
  color: var(--fg-mild);
  font-family: var(--font-head); font-weight: 500; font-size: 13px;
  cursor: pointer;
}
.subtab:hover { background: var(--midnight-10); color: var(--fg-default); }
.subtab.is-active { background: var(--brand-primary); color: #fff; }

.subpanel { display: none; }
.subpanel.is-active { display: block; }

/* P&L 3-column table */
.pnl-table {
  width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px;
}
.pnl-table th, .pnl-table td {
  padding: 12px 14px; border-bottom: 1px solid var(--midnight-50); text-align: right;
}
.pnl-table th { font-family: var(--font-head); font-weight: 500; color: var(--fg-mild); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
.pnl-table th:first-child, .pnl-table td:first-child { text-align: left; }
.pnl-table tr.pnl-total td { font-family: var(--font-head); font-weight: 500; background: var(--midnight-10); }
.pnl-table .neg { color: var(--red-800); }
.pnl-col-inactive { color: var(--fg-mild); }

/* Active channel toggle row */
.channel-toggle {
  display: flex; align-items: center; gap: 12px;
  background: var(--midnight-10); padding: 10px 14px;
  border-radius: var(--radius-sm); margin-bottom: 12px;
  font-size: 13px;
}
.channel-toggle__label { color: var(--fg-mild); font-family: var(--font-head); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; font-size: 11px; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <div class="brand">
        <span class="brand__mark">W</span>
        <span class="brand__title">Wio Pay Sales Calculator</span>
      </div>
      <nav class="tabs" role="tablist" aria-label="Calculator views">
        <button class="tab is-active" role="tab" data-tab="manual" aria-selected="true">Manual Calculator</button>
        <button class="tab" role="tab" data-tab="pnl" aria-selected="false">P&amp;L</button>
        <button class="tab" role="tab" data-tab="backend" aria-selected="false">Backend Assumptions</button>
      </nav>
      <button class="btn btn--ghost" id="app-refresh" title="Reset all inputs &amp; backend assumptions to defaults" style="margin-left:8px;">↻ Refresh</button>
    </div>
  </header>

  <main class="app-main" id="app"></main>

  <footer class="app-footer">
    <span>Internal use only. Standalone build — all logic embedded.</span>
  </footer>

  <script>
(function () {
  'use strict';

  // ==========================================================================
  // mccData — reference data + helpers + pub/sub
  // ==========================================================================

  const industryInterchange = {
    retail:     { debit: 0.0075, credit: 0.0130, label: 'Retail / Supermarket' },
    government: { debit: 0.0050, credit: 0.0050, label: 'Government' },
    utility:    { debit: 0.0050, credit: 0.0050, label: 'Utility' },
    education:  { debit: 0.0065, credit: 0.0065, label: 'Education' },
    realestate: { debit: 0.0065, credit: 0.0065, label: 'Real Estate' },
    petrol:     { debit: 0.0050, credit: 0.0070, label: 'Petrol' },
    transport:  { debit: 0.0050, credit: 0.0050, label: 'Transportation' },
  };

  const riskAdj = { low: 0.0000, med: 0.0020, high: 0.0040 };

  const defaultYields    = { rBal: 0.0200, rXb: 0.0060, rDeb: 0.0114, rLoan: 0.0800 };
  const defaultCostsPG   = { pineLabs: 0.0009, fixedCost: 1.10, debitMix: 0.60 };
  // POS adds terminal-rental + operating costs (mgmt + paper rolls) on top of the variable stack.
  const defaultCostsPOS  = {
    pineLabs: 0.0009,
    fixedCost: 0.55,
    debitMix: 0.60,
    deviceCost: 700,          // AED · per terminal · monthly (rental to Wio)
    terminalMgmt: 15,         // AED · per terminal · monthly (ops cost)
    paperRollPer60: 1.10,     // AED · per 60 transactions (ops cost)
  };

  const SNAPSHOT = {
    industryInterchange: JSON.parse(JSON.stringify(industryInterchange)),
    riskAdj:             JSON.parse(JSON.stringify(riskAdj)),
    defaultYields:       { ...defaultYields },
    defaultCostsPG:      { ...defaultCostsPG },
    defaultCostsPOS:     { ...defaultCostsPOS },
  };

  function resetMccDefaults() {
    Object.keys(industryInterchange).forEach(k => delete industryInterchange[k]);
    Object.assign(industryInterchange, JSON.parse(JSON.stringify(SNAPSHOT.industryInterchange)));
    Object.assign(riskAdj, JSON.parse(JSON.stringify(SNAPSHOT.riskAdj)));
    Object.assign(defaultYields,   SNAPSHOT.defaultYields);
    Object.assign(defaultCostsPG,  SNAPSHOT.defaultCostsPG);
    Object.assign(defaultCostsPOS, SNAPSHOT.defaultCostsPOS);
    notifyMcc();
  }

  function aovCharge(aov, b1, b2, b3, b4) {
    if (aov < 200)  return b1;
    if (aov < 500)  return b2;
    if (aov < 1000) return b3;
    return b4;
  }

  const mccSubscribers = new Set();
  function subscribeMcc(callback) {
    if (typeof callback === 'function') mccSubscribers.add(callback);
    return () => mccSubscribers.delete(callback);
  }
  function notifyMcc() {
    mccSubscribers.forEach(cb => {
      try { cb(); } catch (e) { console.error('mccData subscriber error', e); }
    });
  }

  // ==========================================================================
  // pricingEngine — canonical engine (mirror of LOGIC_EXTRACT §4)
  // ==========================================================================

  // Pure actuals: cost stack + 4-component banking revenue + PG profile.
  // No tier mappings, no caps, no recommended MDR — just raw economics.
  function runPricingEngine(inp) {
    const {
      industry,
      balance, xborder, spend, loans, loanTenure,
      aov, txnCount,
      debitMix, pineLabs, fixedCost,
      deviceCost, numTerminals, terminalMgmt, paperRollPer60,
      chargedPerTerminal, setupFeeMonthly,
      rBal, rXb, rDeb, rLoan, b1, b2, b3, b4,
    } = inp;

    const ic = industryInterchange[industry] || industryInterchange.retail;
    const creditMix = 1 - debitMix;
    const weightedInterchange = ic.debit * debitMix + ic.credit * creditMix;
    const fixedCostPctOfAOV = fixedCost / Math.max(1, aov);
    const variableCostPct = weightedInterchange + pineLabs + fixedCostPctOfAOV;

    const revBal = balance * rBal;
    const revXb  = xborder * rXb;
    const revDeb = spend   * rDeb;
    const monthlyRate = rLoan / 12;
    let revLoan = 0, loanEMI = 0;
    if (loans > 0 && loanTenure > 0 && monthlyRate > 0) {
      const r = monthlyRate, n = loanTenure;
      loanEMI = loans * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
      let bal = loans;
      for (let m = 0; m < n; m++) {
        const int = bal * r;
        if (m < 12) revLoan += int;
        bal -= (loanEMI - int);
      }
    }
    const bankingRev = revBal + revXb + revDeb + revLoan;

    const pgYearVol    = aov * txnCount * 12;
    const txnsYear     = pgYearVol / Math.max(1, aov);
    const aovFee       = aovCharge(aov, b1, b2, b3, b4);
    const aovFeeAnnual = aovFee * txnsYear;
    const variableCostAnnual = pgYearVol * variableCostPct;

    // ----- POS terminal economics (treated as a separate calculation) -----
    // Terminal procurement and terminal charge are BOTH one-time / annual figures
    // (no × 12). They are netted against each other; only the residual (if any)
    // flows into POS Other Cost. Excess terminal revenue (when the merchant pays
    // more than procurement) shows up on the revenue side.
    const nT                       = Math.max(0, numTerminals || 0);
    const grossTerminalProcAnnual  = nT * (deviceCost          || 0);  // 700 × numT
    const grossTerminalRevAnnual   = nT * (chargedPerTerminal  || 0);
    const netTerminalProcAnnual    = Math.max(0, grossTerminalProcAnnual - grossTerminalRevAnnual);
    const excessTerminalRevAnnual  = Math.max(0, grossTerminalRevAnnual - grossTerminalProcAnnual);

    // Recurring POS operating costs (independent of terminal procurement offset).
    const terminalMgmtAnnual       = nT * (terminalMgmt   || 0) * 12;       // AED 15 / terminal / month
    const paperRollAnnual          = (txnsYear / 60) * (paperRollPer60 || 0); // AED 1.10 / 60 txns

    // POS Other Cost = net unrecovered procurement + management + paper roll.
    const posOtherCostAnnual       = netTerminalProcAnnual + terminalMgmtAnnual + paperRollAnnual;

    // Setup fee is a separate monthly recurring revenue stream.
    const setupFeeAnnual           = (setupFeeMonthly || 0) * 12;

    // POS-only extra revenue added to the revenue waterfall.
    const posExtraRevenueAnnual    = excessTerminalRevAnnual + setupFeeAnnual;

    // Total cost (used for net calc) includes POS Other Cost.
    const pgCostAnnual = variableCostAnnual + posOtherCostAnnual;
    // Displayed "PG / POS Cost %" — ONLY payment-processing rate. NO terminal economics.
    const pgCostPct    = variableCostPct;

    return {
      pgCostPct, pgCostAnnual, bankingRev,
      revBal, revXb, revDeb, revLoan, loanEMI,
      pgYearVol, txnsYear, aovFee, aovFeeAnnual,
      variableCostPct, variableCostAnnual,
      grossTerminalProcAnnual, grossTerminalRevAnnual,
      netTerminalProcAnnual,   excessTerminalRevAnnual,
      terminalMgmtAnnual, paperRollAnnual,
      posOtherCostAnnual,
      setupFeeAnnual, posExtraRevenueAnnual,
    };
  }

  // ==========================================================================
  // approvalPaths — four paths + AED-based rebalancing + loan helpers
  // ==========================================================================

  function calcYear1Interest(principal, annualRate, months) {
    if (principal <= 0 || months <= 0) return 0;
    const r = annualRate / 12;
    if (r <= 0) return 0;
    const emi = principal * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1);
    let bal = principal, interest = 0;
    for (let m = 0; m < Math.min(months, 12); m++) {
      const int = bal * r;
      interest += int;
      bal -= (emi - int);
    }
    return interest;
  }

  function solveLoanPrincipal(targetInterest, annualRate, months) {
    if (targetInterest <= 0 || annualRate <= 0 || months <= 0) return 0;
    let lo = 0, hi = 1e9;
    for (let i = 0; i < 60; i++) {
      const mid = (lo + hi) / 2;
      if (calcYear1Interest(mid, annualRate, months) < targetInterest) lo = mid;
      else hi = mid;
    }
    return (lo + hi) / 2;
  }

  function revToAed(key, rev, inp) {
    if (rev <= 0) return 0;
    if (key === 'balance') return inp.rBal  > 0 ? rev / inp.rBal : 0;
    if (key === 'spend')   return inp.rDeb  > 0 ? rev / inp.rDeb : 0;
    if (key === 'fx')      return inp.rXb   > 0 ? rev / inp.rXb  : 0;
    if (key === 'loan')    return inp.rLoan > 0
      ? solveLoanPrincipal(rev, inp.rLoan, inp.loanTenure || 24) : 0;
    return 0;
  }

  function pathRevenue(key, aedVal, inp) {
    if (!aedVal || aedVal <= 0) return 0;
    if (key === 'balance') return inp.rBal * aedVal;
    if (key === 'spend')   return inp.rDeb * aedVal;
    if (key === 'fx')      return inp.rXb  * aedVal;
    if (key === 'loan')    return inp.rLoan > 0
      ? calcYear1Interest(aedVal, inp.rLoan, inp.loanTenure || 24) : 0;
    return 0;
  }

  function pathTotalRev(state, inp) {
    return ['balance', 'spend', 'fx', 'loan']
      .reduce((s, k) => s + pathRevenue(k, state[k] || 0, inp), 0);
  }

  function initApprovalPath(state, shortfall, inp) {
    const rates = { balance: inp.rBal, spend: inp.rDeb, fx: inp.rXb, loan: inp.rLoan };
    ['balance', 'spend', 'fx', 'loan'].forEach(k => {
      state[k] = rates[k] > 0 ? Math.ceil(revToAed(k, shortfall, inp)) : 0;
    });
  }

  function rebalanceApprovalPath(state, changedKey, newAed, shortfall, inp) {
    state[changedKey] = Math.max(0, +newAed || 0);
    const revChanged = pathRevenue(changedKey, state[changedKey], inp);
    const remaining  = Math.max(0, shortfall - revChanged);
    const rates  = { balance: inp.rBal, spend: inp.rDeb, fx: inp.rXb, loan: inp.rLoan };
    const others = ['balance', 'spend', 'fx', 'loan']
      .filter(k => k !== changedKey && rates[k] > 0);
    if (others.length === 0 || remaining <= 0) {
      others.forEach(k => { state[k] = 0; });
    } else {
      const revPerPath = remaining / others.length;
      others.forEach(k => { state[k] = Math.ceil(revToAed(k, revPerPath, inp)); });
    }
  }

  function loanTenureMatrix(shortfall, inp, tenures) {
    const list = tenures || [12, 24, 36, 48];
    return list.map(months => {
      const principal = shortfall > 0 ? solveLoanPrincipal(shortfall, inp.rLoan, months) : 0;
      const r = (inp.rLoan || 0) / 12;
      const emi = (principal > 0 && r > 0)
        ? principal * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1)
        : 0;
      return { months, principal, emi };
    });
  }

  // ==========================================================================
  // manualCalculator — reverse logic for a single requested MDR
  // ==========================================================================

  // Actuals-only manual calculator. Risk adjustment is added by the requested
  // MDR if needed by the user — the engine reads PG revenue as
  // `reqMdrPct × pgYearVol + per-txn fee revenue`. No tier mapping.
  function runManualCalculator(inp, reqMdrPct) {
    const r = runPricingEngine(inp);

    // PG/POS revenue = MDR revenue + per-txn fee + POS-only extras (terminal charge + setup fee).
    const pgRev       = reqMdrPct * r.pgYearVol + r.aovFeeAnnual + r.posExtraRevenueAnnual;
    const pgOnlyNet   = pgRev - r.pgCostAnnual;
    const totalRelNet = r.bankingRev + pgOnlyNet;

    // Three states, all driven by actuals:
    //   pos  — PG-only economics break even or better on their own
    //   warn — PG-only loses money but banking revenue makes the total positive
    //   cond — Total is loss-making; show approval paths to close the gap
    let status, statusLabel;
    if (pgOnlyNet >= 0) {
      status      = 'pos';
      statusLabel = 'Covered by PG Economics';
    } else if (totalRelNet >= 0) {
      status      = 'warn';
      statusLabel = 'Covered by Banking Relationship';
    } else {
      status      = 'cond';
      statusLabel = 'Additional Relationship Required';
    }

    // Shortfall = AED of banking revenue needed to bring totalRelNet to break-even.
    const shortfall  = Math.max(0, -totalRelNet);
    const reqBalance = (inp.rBal > 0) ? shortfall / inp.rBal : 0;

    return {
      status, statusLabel,
      requestedMdrPct: reqMdrPct,
      pgCostPct: r.pgCostPct, pgYearVol: r.pgYearVol,
      pgRev, pgOnlyNet, bankingRev: r.bankingRev, totalRelNet,
      shortfall, reqBalance,
      engine: r,
    };
  }

  // ==========================================================================
  // state — single global app state + tiny pub/sub
  // ==========================================================================

  const STORAGE_KEY = 'wio-pay-sales-calc-state-v2';
  const DEFAULT_ECOM_BRACKETS = [1.00, 0.75, 0.50, 0.00];
  const DEFAULTS = Object.freeze({
    // shared merchant profile
    industry: 'retail', risk: 'low',
    balance: 0, xborder: 0, spend: 0, loans: 0, loanTenure: 24,

    // PG channel
    pg: {
      active: true,
      aov: 200, txnCount: 500, debitMix: 0.60,
      requestedMdrPct: 0.0150,
      ecomBrackets: [...DEFAULT_ECOM_BRACKETS],
    },

    // POS channel
    pos: {
      active: false,
      aov: 80, txnCount: 1500, debitMix: 0.60,
      requestedMdrPct: 0.0200,
      numTerminals: 1,
      chargedPerTerminal: 0,
      setupFeeMonthly: 0,
    },

    // UI (not persisted)
    activeTab: 'manual',         // 'manual' | 'pnl' | 'backend'
    manualSubTab: 'pg',          // 'pg' | 'pos'

    // approval path (lives in P&L tab now — not persisted)
    manualPath: { balance: 0, spend: 0, fx: 0, loan: 0 },
  });

  function freshDefaults() {
    return {
      ...DEFAULTS,
      pg:  { ...DEFAULTS.pg,  ecomBrackets: [...DEFAULT_ECOM_BRACKETS] },
      pos: { ...DEFAULTS.pos },
      manualPath: { ...DEFAULTS.manualPath },
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return freshDefaults();
      const parsed = JSON.parse(raw);
      const def = freshDefaults();
      const ecom = parsed.pg && Array.isArray(parsed.pg.ecomBrackets) && parsed.pg.ecomBrackets.length === 4
        ? parsed.pg.ecomBrackets.map(v => num(v, 0))
        : [...DEFAULT_ECOM_BRACKETS];
      return {
        ...def,
        ...parsed,
        pg:  { ...def.pg,  ...(parsed.pg  || {}), ecomBrackets: ecom },
        pos: { ...def.pos, ...(parsed.pos || {}) },
        // UI / approval-path fields always start from defaults
        activeTab: 'manual',
        manualSubTab: 'pg',
        manualPath: { ...def.manualPath },
      };
    } catch {
      return freshDefaults();
    }
  }

  function saveStateToLs(s) {
    try {
      const persisted = {
        industry: s.industry, risk: s.risk,
        balance: s.balance, xborder: s.xborder, spend: s.spend,
        loans: s.loans, loanTenure: s.loanTenure,
        pg:  { ...s.pg },
        pos: { ...s.pos },
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(persisted));
    } catch { /* ignore */ }
  }

  const _state = loadState();
  const stateSubscribers = new Set();

  function getState() { return _state; }
  function setState(patch) {
    Object.assign(_state, patch);
    saveStateToLs(_state);
    emitState();
  }
  function setManualPath(key, value) { _state.manualPath[key] = value; emitState(); }
  function onChange(cb) {
    if (typeof cb === 'function') stateSubscribers.add(cb);
    return () => stateSubscribers.delete(cb);
  }
  function emitState() {
    stateSubscribers.forEach(cb => {
      try { cb(_state); } catch (e) { console.error('state subscriber error', e); }
    });
  }

  function num(v, fallback) {
    if (fallback === undefined) fallback = 0;
    // Forgiving parse — strip commas / whitespace / stray chars so paste works.
    if (typeof v === 'string') {
      const cleaned = v.replace(/[^\d.\-]/g, '');
      if (cleaned === '' || cleaned === '-' || cleaned === '.') return fallback;
      const n = parseFloat(cleaned);
      return Number.isFinite(n) ? n : fallback;
    }
    const n = +v;
    return Number.isFinite(n) ? n : fallback;
  }
  function clampMin(v, min) { return Math.max(min, num(v, min)); }

  // ==========================================================================
  // main — DOM + render
  // ==========================================================================

  const aedFmt = new Intl.NumberFormat('en-AE', { maximumFractionDigits: 0 });
  const fmtAED = v => (Number.isFinite(v) ? aedFmt.format(Math.round(v)) : '0');
  const fmtPct = v => (Number.isFinite(v) ? (v * 100).toFixed(2) + '%' : '0.00%');

  // Build the engine input shape for one channel (pg | pos) from shared profile
  // + channel-specific inputs. PG uses defaultCostsPG and ecomBrackets, no
  // terminal fields. POS uses defaultCostsPOS and terminal fields, no e-com
  // brackets (so aovFeeAnnual = 0).
  function buildChannelInput(channel, channelState, sharedState) {
    const isPos = channel === 'pos';
    const stack = isPos ? defaultCostsPOS : defaultCostsPG;
    const cs    = channelState || {};
    const ecom  = (cs.ecomBrackets || DEFAULT_ECOM_BRACKETS);
    return {
      mode: channel,
      industry: sharedState.industry,
      risk: sharedState.risk,
      balance: clampMin(sharedState.balance, 0),
      xborder: clampMin(sharedState.xborder, 0),
      spend: clampMin(sharedState.spend, 0),
      loans: clampMin(sharedState.loans, 0),
      loanTenure: clampMin(sharedState.loanTenure, 0),
      aov: clampMin(cs.aov, 1),
      txnCount: clampMin(cs.txnCount, 0),
      debitMix: Math.min(1, Math.max(0, num(cs.debitMix, stack.debitMix))),
      pineLabs: stack.pineLabs,
      fixedCost: stack.fixedCost,
      // POS-only — zero for PG so they're ignored by the engine.
      deviceCost:        isPos ? stack.deviceCost     : 0,
      terminalMgmt:      isPos ? stack.terminalMgmt   : 0,
      paperRollPer60:    isPos ? stack.paperRollPer60 : 0,
      numTerminals:      isPos ? clampMin(cs.numTerminals, 0)       : 0,
      chargedPerTerminal:isPos ? clampMin(cs.chargedPerTerminal, 0) : 0,
      setupFeeMonthly:   isPos ? clampMin(cs.setupFeeMonthly, 0)    : 0,
      rBal:  defaultYields.rBal,
      rXb:   defaultYields.rXb,
      rDeb:  defaultYields.rDeb,
      rLoan: defaultYields.rLoan,
      // POS doesn't levy e-com per-txn fees — zero out brackets so aovFeeAnnual = 0.
      b1: isPos ? 0 : clampMin(ecom[0], 0),
      b2: isPos ? 0 : clampMin(ecom[1], 0),
      b3: isPos ? 0 : clampMin(ecom[2], 0),
      b4: isPos ? 0 : clampMin(ecom[3], 0),
    };
  }

  // Run one channel through the pricing engine. Returns the channel's
  // pgRev / pgCostAnnual / pgOnlyNet (channel net = pgRev - pgCostAnnual,
  // banking is OUT) plus the raw engine output for waterfall rendering.
  function runChannel(channel, channelState, sharedState) {
    const inp = buildChannelInput(channel, channelState, sharedState);
    const r   = runPricingEngine(inp);
    const reqMdrPct = num(channelState.requestedMdrPct, 0);
    const pgRev     = reqMdrPct * r.pgYearVol + r.aovFeeAnnual + r.posExtraRevenueAnnual;
    const pgOnlyNet = pgRev - r.pgCostAnnual;
    return {
      inp,
      engine: r,
      requestedMdrPct: reqMdrPct,
      pgCostPct:    r.pgCostPct,
      pgYearVol:    r.pgYearVol,
      pgRev,
      pgCostAnnual: r.pgCostAnnual,
      pgOnlyNet,
    };
  }

  // Banking revenue depends only on the shared profile (balance / xborder /
  // spend / loans / tenure / yields). Compute it once independent of channel.
  function computeBankingRev(sharedState) {
    const inp = buildChannelInput('pg', sharedState.pg, sharedState);
    return runPricingEngine(inp).bankingRev;
  }

  const app = document.getElementById('app');

    if (ch.pgOnlyNet >= 0) return { status: 'pos', statusLabel: 'Channel economics positive' };
    return { status: 'cond', statusLabel: 'Channel economics negative — relies on banking / approval' };

  // Roll up the relationship: per-channel revenue/cost/net, banking, total.
  function computePnl(s) {
    const pgActive  = !!s.pg.active;
    const posActive = !!s.pos.active;
    const pgCh  = runChannel('pg',  s.pg,  s);
    const posCh = runChannel('pos', s.pos, s);

    const pgRev    = pgActive  ? pgCh.pgRev        : 0;
    const pgCost   = pgActive  ? pgCh.pgCostAnnual : 0;
    const pgNet    = pgRev - pgCost;

    const posRev   = posActive ? posCh.pgRev        : 0;
    const posCost  = posActive ? posCh.pgCostAnnual : 0;
    const posNet   = posRev - posCost;

    const totalRev  = pgRev  + posRev;
    const totalCost = pgCost + posCost;
    const channelNet = totalRev - totalCost;

    const bankingRev   = computeBankingRev(s);
    const totalRelNet  = channelNet + bankingRev;
    const shortfall    = Math.max(0, -totalRelNet);

    // Total-relationship status
    let status, statusLabel;
    if (channelNet >= 0) {
      status = 'pos';
      statusLabel = 'Covered by Channel Economics';
    } else if (totalRelNet >= 0) {
      status = 'warn';
      statusLabel = 'Covered by Banking Relationship';
    } else {
      status = 'cond';
      statusLabel = 'Additional Relationship Required';
    }

    return {
      pgActive, posActive,
      pgRev, pgCost, pgNet,
      posRev, posCost, posNet,
      totalRev, totalCost, channelNet,
      bankingRev, totalRelNet, shortfall,
      status, statusLabel,
    };
  }

  // P&L approval-path engine input — uses shared profile, NIM/FX/spend/loan
  // yields (no channel dependency). We reuse buildChannelInput for shape.
  function pnlApprovalInp(s) {
    return buildChannelInput('pg', s.pg, s);
  }

    const renderCell = (active, val) => active

    const verdictForPitch = {

  function pctInput(value, onCh) {
    const input = document.createElement('input');
    input.className = 'input mono';
    input.type = 'text';
    input.inputMode = 'decimal';
    input.step = '0.0001';
    input.value = (value * 100).toFixed(4);
    input.addEventListener('input', e => {
      const pct = num(e.target.value, 0) / 100;
      onCh(pct);
    });
    return input;
  }

  function numInput(value, onCh, step) {
    const input = document.createElement('input');
    input.className = 'input mono';
    input.type = 'text';
    input.inputMode = 'decimal';
    input.step = String(step || 1);
    input.value = value;
    input.addEventListener('input', e => onCh(num(e.target.value, 0)));
    return input;
  }

    const baseCostRows = [
      { key: 'pineLabs',  label: 'Pine Labs variable %',  kind: 'pct' },
      { key: 'fixedCost', label: 'Fixed cost (AED / txn)', kind: 'num', step: 0.01 },
      { key: 'debitMix',  label: 'Default debit mix %',   kind: 'pct' },
    ];
    renderCostStack('#t-costs-pg',  defaultCostsPG,  baseCostRows);
    renderCostStack('#t-costs-pos', defaultCostsPOS, [
      ...baseCostRows,
      { key: 'deviceCost',     label: 'Terminal procurement (AED · per terminal)',    kind: 'num', step: 50 },
      { key: 'terminalMgmt',   label: 'Terminal management (AED · per terminal · monthly)', kind: 'num', step: 1 },
      { key: 'paperRollPer60', label: 'Paper roll (AED · per 60 txns)',               kind: 'num', step: 0.05 },
    ]);

    const tRisk = panel.querySelector('#t-risk');
    ['low', 'med', 'high'].forEach(k => {
      const tr = document.createElement('tr');
      const tdL = document.createElement('td'); tdL.textContent = { low: 'Low', med: 'Medium', high: 'High' }[k];
      const tdV = document.createElement('td'); tdV.appendChild(pctInput(riskAdj[k], x => { riskAdj[k] = x; notifyMcc(); }));
      tr.append(tdL, tdV);
      tRisk.appendChild(tr);
    });

    panel.querySelector('#backend-reset').addEventListener('click', () => {
      resetMccDefaults();
    });
  }

  function render() {
    // Capture focus + scroll before innerHTML replacement (which would otherwise
    // blow away focus and reset scroll to top on every keystroke).
    const active     = document.activeElement;
    const activeId   = active && active.id;
    const cursorS    = (active && typeof active.selectionStart === 'number') ? active.selectionStart : null;
    const cursorE    = (active && typeof active.selectionEnd   === 'number') ? active.selectionEnd   : null;
    const scrollX    = window.scrollX;
    const scrollY    = window.scrollY;

    showActiveTab();
    const s = getState();
    if (s.activeTab === 'manual')  renderManualPanel();
    if (s.activeTab === 'pnl')     renderPnlPanel();
    if (s.activeTab === 'backend') renderBackendPanel();

    // Restore focus + cursor + scroll.
    if (activeId) {
      const el = document.getElementById(activeId);
      if (el) {
        try {
          el.focus({ preventScroll: true });
          // setSelectionRange throws on number inputs in some browsers — swallow.
          if (cursorS !== null && typeof el.setSelectionRange === 'function') {
            el.setSelectionRange(cursorS, cursorE);
          }
        } catch (e) { /* ignore */ }
      }
    }
    window.scrollTo(scrollX, scrollY);
  }

  mountShell();
  render();
  onChange(render);
  subscribeMcc(render);

  // Refresh button — clears persisted state and reloads (full reset).
  const refreshBtn = document.getElementById('app-refresh');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', () => {
      if (!confirm('Reset all calculator inputs and backend assumptions to defaults?')) return;
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
      location.reload();
    });
  }

  window.__wio = {
    getState, runManualCalculator, runPricingEngine,
    runChannel, buildChannelInput, computePnl,
  };
})();
  </script>
</body>
</html>

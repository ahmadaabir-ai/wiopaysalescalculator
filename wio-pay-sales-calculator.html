<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wio Pay Sales Calculator</title>
  <style>
/* Wio Pay Sales Calculator — design tokens from reference/DESIGN-SPEC.md */

:root {
  --brand-primary:   #5700ff;
  --brand-secondary: #0f1a38;
  --brand-accent:    #f7d7d0;
  --brand-neutral:   #f2f1ed;

  --indigo-900: #4700e0;
  --indigo-800: #5700ff;
  --indigo-50:  #e8d9ff;
  --indigo-20:  #f4eeff;
  --indigo-10:  #eee6fe;

  --midnight-900: #0f1a38;
  --midnight-600: #5f667a;
  --midnight-300: #c8ccd4;
  --midnight-100: #e6e8ed;
  --midnight-50:  #e1e2e5;
  --midnight-10:  #f5f5f7;

  --green-800: #1f9369;
  --green-50:  #e6faf2;
  --red-800:   #e8023c;
  --red-50:    #ffe0e8;
  --yellow-800:#f9d100;
  --yellow-100:#fdf2ca;

  --stroke-primary: var(--midnight-50);
  --fg-default: var(--midnight-900);
  --fg-mild:    var(--midnight-600);

  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-pill: 999px;

  --elev-1: 0 1px 2px rgba(15,26,56,.04), 0 1px 1px rgba(15,26,56,.04);
  --elev-2: 0 4px 12px rgba(15,26,56,.06), 0 1px 2px rgba(15,26,56,.04);
  --elev-3: 0 12px 32px rgba(15,26,56,.10), 0 2px 6px rgba(15,26,56,.06);

  --font-body: 'Wio Grotesk App', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-head: 'Aktiv Grotesk App', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--brand-neutral);
  color: var(--fg-default);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 22px;
}

code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; }

.app-header {
  background: #fff;
  border-bottom: 1px solid var(--stroke-primary);
  position: sticky; top: 0; z-index: 10;
}
.app-header__inner {
  max-width: 1440px; margin: 0 auto;
  display: flex; align-items: center; gap: 32px;
  padding: 12px 24px; height: 64px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand__mark {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  background: var(--brand-primary); color: #fff;
  display: grid; place-items: center; font-family: var(--font-head); font-weight: 700; font-size: 20px;
}
.brand__title {
  font-family: var(--font-head); font-weight: 500; font-size: 20px; color: var(--brand-secondary);
}

.tabs { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
.tab {
  border: 0; background: transparent;
  height: 40px; padding: 0 16px;
  border-radius: var(--radius-pill);
  color: var(--fg-mild);
  font-family: var(--font-head); font-weight: 500; font-size: 14px;
  cursor: pointer;
}
.tab:hover { background: var(--midnight-10); color: var(--fg-default); }
.tab.is-active { background: var(--brand-primary); color: #fff; }

.app-main { max-width: 1440px; margin: 0 auto; padding: 24px; }
.app-footer { text-align: center; color: var(--fg-mild); font-size: 12px; padding: 24px; }

.panel { display: none; }
.panel.is-active { display: block; }

.split {
  display: grid;
  grid-template-columns: minmax(320px, 380px) 1fr;
  gap: 24px;
}
@media (max-width: 960px) { .split { grid-template-columns: 1fr; } }

.card {
  background: #fff;
  border: 1px solid var(--stroke-primary);
  border-radius: var(--radius-md);
  box-shadow: var(--elev-1);
  padding: 24px;
}
.card + .card { margin-top: 16px; }
.card__title {
  font-family: var(--font-head); font-weight: 500; font-size: 20px; line-height: 24px;
  margin: 0 0 4px;
}
.card__subtitle { color: var(--fg-mild); font-size: 14px; margin: 0 0 16px; }

.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field__label { font-size: 12px; color: var(--fg-mild); font-family: var(--font-head); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
.field__hint { font-size: 12px; color: var(--fg-mild); }

.input, .select {
  height: 44px;
  border: 1px solid var(--stroke-primary);
  border-radius: var(--radius-sm);
  background: #fff;
  padding: 0 12px;
  font-family: var(--font-body); font-size: 16px;
  color: var(--fg-default);
  width: 100%;
}
.input:focus, .select:focus {
  outline: 2px solid var(--brand-primary);
  outline-offset: -1px;
  border-color: var(--brand-primary);
}

.input--lg {
  height: 56px; font-size: 28px; font-family: var(--font-head); font-weight: 500;
  letter-spacing: -0.5px;
}

.chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  border: 1px solid var(--stroke-primary);
  background: #fff;
  border-radius: var(--radius-pill);
  height: 32px;
  padding: 0 14px;
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font-head); font-weight: 500;
  color: var(--fg-default);
}
.chip:hover { background: var(--midnight-10); }
.chip.is-active {
  background: var(--indigo-10);
  color: var(--brand-primary);
  border-color: var(--brand-primary);
}

.toggle-row { display: flex; align-items: center; gap: 10px; }

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 540px) { .row-2 { grid-template-columns: 1fr; } }

.slider { width: 100%; accent-color: var(--brand-primary); }

.verdict {
  display: flex; align-items: center; gap: 16px;
  border-radius: var(--radius-md); padding: 16px 20px;
  font-family: var(--font-head); font-weight: 500;
}
.verdict__dot { width: 12px; height: 12px; border-radius: 999px; flex: 0 0 12px; }
.verdict__label { font-size: 18px; }
.verdict__detail { font-size: 13px; color: var(--fg-mild); font-family: var(--font-body); font-weight: 400; margin-top: 2px; }
.verdict--pos  { background: var(--green-50);    color: var(--green-800); }
.verdict--pos  .verdict__dot { background: var(--green-800); }
.verdict--warn { background: var(--indigo-20);   color: var(--indigo-900); }
.verdict--warn .verdict__dot { background: var(--indigo-900); }
.verdict--cond { background: var(--yellow-100);  color: var(--midnight-900); }
.verdict--cond .verdict__dot { background: var(--yellow-800); }
.verdict--neg  { background: var(--red-50);      color: var(--red-800); }
.verdict--neg  .verdict__dot { background: var(--red-800); }

.alert {
  background: var(--red-50); color: var(--red-800);
  border-radius: var(--radius-sm); padding: 12px 14px;
  font-size: 14px; margin-top: 12px;
  border: 1px solid rgba(232,2,60,.15);
}

.kpis {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  margin-top: 16px;
}
.kpi {
  background: #fff; border: 1px solid var(--stroke-primary);
  border-radius: var(--radius-md); padding: 14px 16px;
  display: flex; flex-direction: column; gap: 4px;
}
.kpi__label { font-size: 12px; color: var(--fg-mild); text-transform: uppercase; letter-spacing: .04em; font-family: var(--font-head); font-weight: 500; }
.kpi__value { font-size: 22px; font-family: var(--font-head); font-weight: 500; color: var(--brand-secondary); letter-spacing: -0.5px; }
.kpi__value.neg { color: var(--red-800); }
.kpi__hint  { font-size: 12px; color: var(--fg-mild); }

.waterfall { margin-top: 12px; }
.waterfall__row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px dashed var(--midnight-50);
  font-size: 14px;
}
.waterfall__row:last-child { border-bottom: 0; font-weight: 500; font-family: var(--font-head); }
.waterfall__row .neg { color: var(--red-800); }
.waterfall__label { color: var(--fg-mild); }
.waterfall__value { font-family: var(--font-head); font-weight: 500; }

.paths {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  margin-top: 12px;
}
.path-card {
  background: var(--indigo-20);
  border: 1px solid var(--indigo-50);
  border-radius: var(--radius-md);
  padding: 16px;
}
.path-card__name { font-family: var(--font-head); font-weight: 500; font-size: 14px; color: var(--indigo-900); margin-bottom: 6px; }
.path-card__aed  { font-family: var(--font-head); font-weight: 500; font-size: 22px; color: var(--brand-secondary); letter-spacing: -0.5px; }
.path-card__hint { font-size: 12px; color: var(--fg-mild); margin-top: 4px; }

.byo-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  margin-top: 12px;
}
.byo {
  display: flex; flex-direction: column; gap: 4px;
  padding: 12px; background: var(--midnight-10);
  border-radius: var(--radius-sm);
}
.byo__label { font-size: 12px; color: var(--fg-mild); text-transform: uppercase; letter-spacing: .04em; }
.byo__rev { font-size: 12px; color: var(--fg-mild); }

.byo-status {
  margin-top: 12px; padding: 12px; border-radius: var(--radius-sm);
  font-size: 14px;
}
.byo-status.is-ok { background: var(--green-50); color: var(--green-800); }
.byo-status.is-bad { background: var(--red-50); color: var(--red-800); }

.loan-matrix { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
.loan-matrix th, .loan-matrix td {
  padding: 8px 10px; border-bottom: 1px solid var(--midnight-50); text-align: right;
}
.loan-matrix th { font-family: var(--font-head); font-weight: 500; color: var(--fg-mild); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
.loan-matrix th:first-child, .loan-matrix td:first-child { text-align: left; }
.loan-matrix tr.is-active td { background: var(--indigo-10); font-weight: 500; }

.pitch {
  background: var(--brand-secondary); color: #fff;
  border-radius: var(--radius-md); padding: 20px;
  margin-top: 16px;
}
.pitch__title { font-family: var(--font-head); font-weight: 500; font-size: 16px; margin-bottom: 6px; opacity: .8; text-transform: uppercase; letter-spacing: .06em; }
.pitch__body  { font-size: 16px; line-height: 24px; }

.backend-section { margin-bottom: 24px; }
.backend-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.backend-table th, .backend-table td {
  padding: 8px 10px; border-bottom: 1px solid var(--midnight-50); text-align: left;
}
.backend-table th { font-family: var(--font-head); font-weight: 500; color: var(--fg-mild); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
.backend-table input {
  height: 32px; padding: 0 8px; width: 110px;
  border: 1px solid var(--stroke-primary); border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 14px;
}

.btn {
  height: 40px; padding: 0 16px;
  border: 0; border-radius: var(--radius-sm);
  font-family: var(--font-head); font-weight: 500; font-size: 14px;
  cursor: pointer;
}
.btn--primary { background: var(--brand-primary); color: #fff; }
.btn--primary:hover { background: var(--indigo-900); }
.btn--ghost { background: transparent; color: var(--brand-primary); }

.toolbar { display: flex; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 16px; }

.muted { color: var(--fg-mild); }
.neg   { color: var(--red-800); }
.pos   { color: var(--green-800); }
.mono  { font-variant-numeric: tabular-nums; }
.section-label {
  font-family: var(--font-head); font-weight: 500; font-size: 12px;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--fg-mild);
  margin: 24px 0 8px;
}
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <div class="brand">
        <span class="brand__mark">W</span>
        <span class="brand__title">Wio Pay Sales Calculator</span>
      </div>
      <nav class="tabs" role="tablist" aria-label="Calculator views">
        <button class="tab is-active" role="tab" data-tab="manual" aria-selected="true">Manual Calculator</button>
        <button class="tab" role="tab" data-tab="sales" aria-selected="false">Sales Calculator</button>
        <button class="tab" role="tab" data-tab="backend" aria-selected="false">Backend Assumptions</button>
      </nav>
    </div>
  </header>

  <main class="app-main" id="app"></main>

  <footer class="app-footer">
    <span>Internal use only. Standalone build — all logic embedded.</span>
  </footer>

  <script>
(function () {
  'use strict';

  // ==========================================================================
  // mccData — reference data + helpers + pub/sub
  // ==========================================================================

  const industryInterchange = {
    retail:     { debit: 0.0075, credit: 0.0130, label: 'Retail / Supermarket' },
    government: { debit: 0.0050, credit: 0.0050, label: 'Government' },
    utility:    { debit: 0.0050, credit: 0.0050, label: 'Utility' },
    education:  { debit: 0.0065, credit: 0.0065, label: 'Education' },
    realestate: { debit: 0.0065, credit: 0.0065, label: 'Real Estate' },
    petrol:     { debit: 0.0050, credit: 0.0070, label: 'Petrol' },
    transport:  { debit: 0.0050, credit: 0.0050, label: 'Transportation' },
  };

  const mccMarkupTable = {
    retail: 0.0030, government: 0.0010, utility: 0.0010, education: 0.0010,
    realestate: 0.0020, petrol: 0.0020, transport: 0.0020,
  };

  const riskAdj   = { low: 0.0000, med: 0.0020, high: 0.0040 };
  const riskLabel = { low: 'Low',  med: 'Medium', high: 'High' };

  const tiers = [
    { name: 'Strategic', mdr: 0.0050, ratio: 0.0150 },
    { name: 'Premium',   mdr: 0.0075, ratio: 0.0120 },
    { name: 'Preferred', mdr: 0.0100, ratio: 0.0090 },
    { name: 'Plus',      mdr: 0.0125, ratio: 0.0060 },
    { name: 'Standard',  mdr: 0.0150, ratio: 0.0040 },
    { name: 'Entry',     mdr: 0.0175, ratio: 0.0020 },
    { name: 'Base',      mdr: 0.0200, ratio: 0.0000 },
  ];

  const mccTierMDR = {
    retail:     [0.0050, 0.0075, 0.0100, 0.0125, 0.0150, 0.0175, 0.0200],
    government: [0.0030, 0.0045, 0.0060, 0.0075, 0.0090, 0.0105, 0.0120],
    utility:    [0.0030, 0.0045, 0.0060, 0.0075, 0.0090, 0.0105, 0.0120],
    education:  [0.0040, 0.0055, 0.0070, 0.0085, 0.0100, 0.0115, 0.0130],
    realestate: [0.0040, 0.0055, 0.0070, 0.0085, 0.0100, 0.0115, 0.0130],
    petrol:     [0.0035, 0.0050, 0.0065, 0.0080, 0.0095, 0.0110, 0.0125],
    transport:  [0.0030, 0.0045, 0.0060, 0.0075, 0.0090, 0.0105, 0.0120],
  };

  const tierRank = {
    Strategic: 1, Premium: 2, Preferred: 3,
    Plus: 4, Standard: 5, Entry: 6, Base: 7,
  };

  const bankingRevTiers = [
    { label: 'Strategic',  min: 50000, cap: 'Strategic' },
    { label: 'Premium',    min: 40000, cap: 'Premium'   },
    { label: 'Strong',     min: 30000, cap: 'Preferred' },
    { label: 'Moderate',   min: 20000, cap: 'Plus'      },
    { label: 'Developing', min: 10000, cap: 'Standard'  },
    { label: 'Low',        min: 5000,  cap: 'Entry'     },
    { label: 'Very Low',   min: 0,     cap: 'Base'      },
  ];

  const pgScaleTiers = [
    { label: 'Enterprise', min: 2500000, cap: 'Strategic' },
    { label: 'Mid-Market', min: 1500000, cap: 'Premium'   },
    { label: 'Growth SME', min: 750000,  cap: 'Preferred' },
    { label: 'SME',        min: 400000,  cap: 'Plus'      },
    { label: 'Small',      min: 200000,  cap: 'Standard'  },
    { label: 'Micro',      min: 20000,   cap: 'Entry'     },
    { label: 'Nano',       min: 0,       cap: 'Base'      },
  ];

  const CMC_FEE_DEFAULTS = [1.00, 0.75, 0.50, 0.00];
  const CMC_FEE_BRACKETS = ['0 – 200', '200 – 500', '500 – 1,000', '1,000+'];

  const defaultYields = { rBal: 0.0375, rXb: 0.0060, rDeb: 0.0114, rLoan: 0.0800 };
  const defaultCosts  = { pineLabs: 0.0009, fixedCost: 1.10, debitMix: 0.60 };
  const defaultFloors = { netMdrFloorBps: 0, minMonthlyRev: 0 };

  const SNAPSHOT = {
    industryInterchange: JSON.parse(JSON.stringify(industryInterchange)),
    mccMarkupTable:      JSON.parse(JSON.stringify(mccMarkupTable)),
    riskAdj:             JSON.parse(JSON.stringify(riskAdj)),
    tiers:               JSON.parse(JSON.stringify(tiers)),
    mccTierMDR:          JSON.parse(JSON.stringify(mccTierMDR)),
    bankingRevTiers:     JSON.parse(JSON.stringify(bankingRevTiers)),
    pgScaleTiers:        JSON.parse(JSON.stringify(pgScaleTiers)),
    CMC_FEE_DEFAULTS:    [...CMC_FEE_DEFAULTS],
    defaultYields:       { ...defaultYields },
    defaultCosts:        { ...defaultCosts },
    defaultFloors:       { ...defaultFloors },
  };

  function resetMccDefaults() {
    Object.keys(industryInterchange).forEach(k => delete industryInterchange[k]);
    Object.assign(industryInterchange, JSON.parse(JSON.stringify(SNAPSHOT.industryInterchange)));

    Object.keys(mccMarkupTable).forEach(k => delete mccMarkupTable[k]);
    Object.assign(mccMarkupTable, JSON.parse(JSON.stringify(SNAPSHOT.mccMarkupTable)));

    Object.assign(riskAdj, JSON.parse(JSON.stringify(SNAPSHOT.riskAdj)));

    tiers.length = 0;
    JSON.parse(JSON.stringify(SNAPSHOT.tiers)).forEach(t => tiers.push(t));

    Object.keys(mccTierMDR).forEach(k => delete mccTierMDR[k]);
    Object.assign(mccTierMDR, JSON.parse(JSON.stringify(SNAPSHOT.mccTierMDR)));

    bankingRevTiers.length = 0;
    JSON.parse(JSON.stringify(SNAPSHOT.bankingRevTiers)).forEach(t => bankingRevTiers.push(t));

    pgScaleTiers.length = 0;
    JSON.parse(JSON.stringify(SNAPSHOT.pgScaleTiers)).forEach(t => pgScaleTiers.push(t));

    CMC_FEE_DEFAULTS.length = 0;
    SNAPSHOT.CMC_FEE_DEFAULTS.forEach(v => CMC_FEE_DEFAULTS.push(v));

    Object.assign(defaultYields, SNAPSHOT.defaultYields);
    Object.assign(defaultCosts,  SNAPSHOT.defaultCosts);
    Object.assign(defaultFloors, SNAPSHOT.defaultFloors);
    notifyMcc();
  }

  function vintageFloor(months, industry) {
    const mdrs = mccTierMDR[industry] || mccTierMDR.retail;
    if (months < 6)  return mdrs[6];
    if (months < 12) return mdrs[2];
    return mdrs[0];
  }
  function vintageLabel(months) {
    if (months < 6)  return '< 6 months';
    if (months < 12) return '6–12 months';
    return '12+ months';
  }
  function aovCharge(aov, b1, b2, b3, b4) {
    if (aov < 200)  return b1;
    if (aov < 500)  return b2;
    if (aov < 1000) return b3;
    return b4;
  }
  function aovBucketLabel(aov) {
    if (aov < 200)  return '0–200';
    if (aov < 500)  return '200–500';
    if (aov < 1000) return '500–1,000';
    return '1,000+';
  }
  function getMccTierMDR(industry, tierName) {
    const mdrs = mccTierMDR[industry] || mccTierMDR.retail;
    return mdrs[tierRank[tierName] - 1];
  }
  function getMccMarkup(industry) {
    return mccMarkupTable[industry] !== undefined ? mccMarkupTable[industry] : mccMarkupTable.retail;
  }

  const mccSubscribers = new Set();
  function subscribeMcc(callback) {
    if (typeof callback === 'function') mccSubscribers.add(callback);
    return () => mccSubscribers.delete(callback);
  }
  function notifyMcc() {
    mccSubscribers.forEach(cb => {
      try { cb(); } catch (e) { console.error('mccData subscriber error', e); }
    });
  }

  // ==========================================================================
  // pricingEngine — canonical engine (mirror of LOGIC_EXTRACT §4)
  // ==========================================================================

  function runPricingEngine(inp) {
    const {
      industry, risk, months, tlOverride,
      balance, xborder, spend, loans, loanTenure,
      aov, txnCount,
      debitMix, pineLabs, fixedCost, netMdrFloor, minRev,
      rBal, rXb, rDeb, rLoan, b1, b2, b3, b4,
    } = inp;

    const ic = industryInterchange[industry] || industryInterchange.retail;
    const creditMix = 1 - debitMix;
    const weightedInterchange = ic.debit * debitMix + ic.credit * creditMix;
    const fixedCostPctOfAOV = fixedCost / Math.max(1, aov);
    const pgCostPct = weightedInterchange + pineLabs + fixedCostPctOfAOV;

    const revBal = balance * rBal;
    const revXb  = xborder * rXb;
    const revDeb = spend   * rDeb;
    const monthlyRate = rLoan / 12;
    let revLoan = 0, loanEMI = 0;
    if (loans > 0 && loanTenure > 0 && monthlyRate > 0) {
      const r = monthlyRate, n = loanTenure;
      loanEMI = loans * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
      let bal = loans;
      for (let m = 0; m < n; m++) {
        const int = bal * r;
        if (m < 12) revLoan += int;
        bal -= (loanEMI - int);
      }
    }
    const bankingRev = revBal + revXb + revDeb + revLoan;

    const pgYearVol    = aov * txnCount * 12;
    const txnsYear     = pgYearVol / Math.max(1, aov);
    const aovFee       = aovCharge(aov, b1, b2, b3, b4);
    const aovFeeAnnual = aovFee * txnsYear;
    const pgCostAnnual = pgYearVol * pgCostPct;

    const ratio     = pgYearVol > 0 ? bankingRev / pgYearVol : 0;
    const ratioTier = tiers.find(t => ratio >= t.ratio) || tiers[tiers.length - 1];

    const bankingEntry   = bankingRevTiers.find(t => bankingRev >= t.min);
    const bankingCapName = bankingEntry.cap;

    const pgScaleEntry   = pgScaleTiers.find(t => pgYearVol >= t.min);
    const pgScaleCapName = pgScaleEntry.cap;

    const prelimRank = Math.max(
      tierRank[ratioTier.name],
      tierRank[bankingCapName],
      tierRank[pgScaleCapName],
    );
    const prelimTier = tiers.find(t => tierRank[t.name] === prelimRank);

    const floorVal  = tlOverride ? 0 : vintageFloor(months, industry);
    const prelimIdx = tiers.indexOf(prelimTier);

    let o2FinalTier = prelimTier, o2Final = 0, economicsBump = false;
    for (let i = prelimIdx; i < tiers.length; i++) {
      const t   = tiers[i];
      const mdr = Math.max(getMccTierMDR(industry, t.name), floorVal) + riskAdj[risk];
      const rev = mdr * pgYearVol + aovFeeAnnual;
      const net = bankingRev + rev - pgCostAnnual;
      if (net / 12 >= minRev || i === tiers.length - 1) {
        o2FinalTier = t;
        o2Final     = mdr;
        if (i > prelimIdx) economicsBump = true;
        break;
      }
    }

    const o2PgRev  = o2Final * pgYearVol + aovFeeAnnual;
    const o2Margin = o2PgRev - pgCostAnnual;
    const o2Net    = bankingRev + o2PgRev - pgCostAnnual;

    return {
      pgCostPct, pgCostAnnual, bankingRev,
      revBal, revXb, revDeb, revLoan, loanEMI,
      pgYearVol, txnsYear, aovFee, aovFeeAnnual,
      ratio, ratioTier, bankingEntry, bankingCapName,
      pgScaleEntry, pgScaleCapName,
      prelimTier, prelimRank, economicsBump,
      o2FinalTier, o2Final, floorVal,
      o2PgRev, o2Margin, o2Net,
      baseMDR: getMccTierMDR(industry, 'Base'),
    };
  }

  // ==========================================================================
  // approvalPaths — four paths + AED-based rebalancing + loan helpers
  // ==========================================================================

  function calcYear1Interest(principal, annualRate, months) {
    if (principal <= 0 || months <= 0) return 0;
    const r = annualRate / 12;
    if (r <= 0) return 0;
    const emi = principal * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1);
    let bal = principal, interest = 0;
    for (let m = 0; m < Math.min(months, 12); m++) {
      const int = bal * r;
      interest += int;
      bal -= (emi - int);
    }
    return interest;
  }

  function solveLoanPrincipal(targetInterest, annualRate, months) {
    if (targetInterest <= 0 || annualRate <= 0 || months <= 0) return 0;
    let lo = 0, hi = 1e9;
    for (let i = 0; i < 60; i++) {
      const mid = (lo + hi) / 2;
      if (calcYear1Interest(mid, annualRate, months) < targetInterest) lo = mid;
      else hi = mid;
    }
    return (lo + hi) / 2;
  }

  function revToAed(key, rev, inp) {
    if (rev <= 0) return 0;
    if (key === 'balance') return inp.rBal  > 0 ? rev / inp.rBal : 0;
    if (key === 'spend')   return inp.rDeb  > 0 ? rev / inp.rDeb : 0;
    if (key === 'fx')      return inp.rXb   > 0 ? rev / inp.rXb  : 0;
    if (key === 'loan')    return inp.rLoan > 0
      ? solveLoanPrincipal(rev, inp.rLoan, inp.loanTenure || 24) : 0;
    return 0;
  }

  function pathRevenue(key, aedVal, inp) {
    if (!aedVal || aedVal <= 0) return 0;
    if (key === 'balance') return inp.rBal * aedVal;
    if (key === 'spend')   return inp.rDeb * aedVal;
    if (key === 'fx')      return inp.rXb  * aedVal;
    if (key === 'loan')    return inp.rLoan > 0
      ? calcYear1Interest(aedVal, inp.rLoan, inp.loanTenure || 24) : 0;
    return 0;
  }

  function pathTotalRev(state, inp) {
    return ['balance', 'spend', 'fx', 'loan']
      .reduce((s, k) => s + pathRevenue(k, state[k] || 0, inp), 0);
  }

  function initApprovalPath(state, shortfall, inp) {
    const rates = { balance: inp.rBal, spend: inp.rDeb, fx: inp.rXb, loan: inp.rLoan };
    ['balance', 'spend', 'fx', 'loan'].forEach(k => {
      state[k] = rates[k] > 0 ? Math.ceil(revToAed(k, shortfall, inp)) : 0;
    });
  }

  function rebalanceApprovalPath(state, changedKey, newAed, shortfall, inp) {
    state[changedKey] = Math.max(0, +newAed || 0);
    const revChanged = pathRevenue(changedKey, state[changedKey], inp);
    const remaining  = Math.max(0, shortfall - revChanged);
    const rates  = { balance: inp.rBal, spend: inp.rDeb, fx: inp.rXb, loan: inp.rLoan };
    const others = ['balance', 'spend', 'fx', 'loan']
      .filter(k => k !== changedKey && rates[k] > 0);
    if (others.length === 0 || remaining <= 0) {
      others.forEach(k => { state[k] = 0; });
    } else {
      const revPerPath = remaining / others.length;
      others.forEach(k => { state[k] = Math.ceil(revToAed(k, revPerPath, inp)); });
    }
  }

  function loanTenureMatrix(shortfall, inp, tenures) {
    const list = tenures || [12, 24, 36, 48];
    return list.map(months => {
      const principal = shortfall > 0 ? solveLoanPrincipal(shortfall, inp.rLoan, months) : 0;
      const r = (inp.rLoan || 0) / 12;
      const emi = (principal > 0 && r > 0)
        ? principal * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1)
        : 0;
      return { months, principal, emi };
    });
  }

  // ==========================================================================
  // manualCalculator — reverse logic for a single requested MDR
  // ==========================================================================

  function calcTierRevGap(r, inp, reqMdrPct) {
    const industryMdrs = mccTierMDR[inp.industry] || mccTierMDR.retail;
    const adjTiers   = tiers.map((t, i) => ({ ...t, mdr: industryMdrs[i] }));
    const dispMarkup = getMccMarkup(inp.industry);
    const dispRisk   = riskAdj[inp.risk] || 0;
    const targetTier = adjTiers.reduce((best, t) => {
      const tDisp    = t.mdr    + dispMarkup + dispRisk;
      const bestDisp = best.mdr + dispMarkup + dispRisk;
      return Math.abs(tDisp - reqMdrPct) < Math.abs(bestDisp - reqMdrPct) ? t : best;
    });
    const reqBankEntry = bankingRevTiers.slice().reverse().find(
      t => tierRank[t.cap] <= tierRank[targetTier.name],
    );
    const totalReq = reqBankEntry ? reqBankEntry.min : 0;
    const revGap   = Math.max(0, totalReq - (r ? r.bankingRev : 0));
    return { revGap, targetTier, reqBankEntry };
  }

  function runManualCalculator(inp, reqMdrPct) {
    const r = runPricingEngine(inp);
    const { revGap, targetTier, reqBankEntry } = calcTierRevGap(r, inp, reqMdrPct);

    const pgRev      = reqMdrPct * r.pgYearVol + r.aovFeeAnnual;
    const pgOnlyNet  = pgRev - r.pgCostAnnual;
    const totalRelNet = r.bankingRev + pgOnlyNet;

    const netMdrFloorBps = inp.netMdrFloor != null ? inp.netMdrFloor : defaultFloors.netMdrFloorBps;
    const minMonthlyRev  = inp.minRev      != null ? inp.minRev      : defaultFloors.minMonthlyRev;
    const floorFromBps   = (netMdrFloorBps / 10000) * r.pgYearVol;
    const floorFromMin   = minMonthlyRev * 12;
    const controllingFloor = Math.max(floorFromBps, floorFromMin);
    const controllingFloorIsMdr = floorFromBps >= floorFromMin && netMdrFloorBps > 0;

    const pgCovers  = pgOnlyNet  >= controllingFloor;
    const relCovers = totalRelNet >= controllingFloor;

    const minAllowedMdr   = vintageFloor(inp.months, inp.industry) + (riskAdj[inp.risk] || 0);
    const belowPolicyFloor = reqMdrPct < minAllowedMdr && !inp.tlOverride;

    let status, statusLabel;
    if (belowPolicyFloor) {
      status      = 'neg';
      statusLabel = 'Manual Exception Required — Below Policy Floor';
    } else if (pgCovers) {
      status      = 'pos';
      statusLabel = 'Covered by PG Economics';
    } else if (relCovers) {
      status      = 'warn';
      statusLabel = 'Covered by Banking Relationship';
    } else if (revGap > 0) {
      status      = 'cond';
      statusLabel = 'Conditionally Viable — Additional Relationship Required';
    } else {
      status      = 'neg';
      statusLabel = 'Manual Review Required';
    }

    const shortfall  = Math.max(0, controllingFloor - totalRelNet);
    const reqBalance = (inp.rBal > 0) ? shortfall / inp.rBal : 0;

    return {
      status, statusLabel,
      requestedMdrPct: reqMdrPct,
      pgCostPct: r.pgCostPct, pgYearVol: r.pgYearVol,
      pgRev, pgOnlyNet, bankingRev: r.bankingRev, totalRelNet,
      controllingFloor, controllingFloorIsMdr,
      pgCovers, relCovers, shortfall, reqBalance,
      belowPolicyFloor, minAllowedMdr,
      targetTier, reqBankEntry, revGap,
      engine: r,
    };
  }

  // state — single global app state + tiny pub/sub

  const STORAGE_KEY = 'wio-pay-sales-calc-state-v1';
  const DEFAULTS = Object.freeze({
    industry: 'retail', risk: 'low', months: 12, tlOverride: false,
    balance: 0, xborder: 0, spend: 0, loans: 0, loanTenure: 24,
    aov: 200, txnCount: 500, debitMix: 0.60,
    requestedMdrPct: 0.0150, desiredMdrPct: 0.0150,
    activeTab: 'manual',
    manualPath: { balance: 0, spend: 0, fx: 0, loan: 0 },
    salesPath:  { balance: 0, spend: 0, fx: 0, loan: 0 },
  });

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return { ...DEFAULTS,
          manualPath: { ...DEFAULTS.manualPath },
          salesPath:  { ...DEFAULTS.salesPath } };
      }
      const parsed = JSON.parse(raw);
      return {
        ...DEFAULTS, ...parsed,
        manualPath: { ...DEFAULTS.manualPath, ...(parsed.manualPath || {}) },
        salesPath:  { ...DEFAULTS.salesPath,  ...(parsed.salesPath  || {}) },
      };
    } catch {
      return { ...DEFAULTS,
        manualPath: { ...DEFAULTS.manualPath },
        salesPath:  { ...DEFAULTS.salesPath } };
    }
  }

  function saveStateToLs(s) {
    try {
      const persisted = {
        industry: s.industry, risk: s.risk, months: s.months, tlOverride: s.tlOverride,
        balance: s.balance, xborder: s.xborder, spend: s.spend,
        loans: s.loans, loanTenure: s.loanTenure,
        aov: s.aov, txnCount: s.txnCount, debitMix: s.debitMix,
        requestedMdrPct: s.requestedMdrPct, desiredMdrPct: s.desiredMdrPct,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(persisted));
    } catch { /* ignore */ }
  }

  const _state = loadState();
  const stateSubscribers = new Set();

  function getState() { return _state; }
  function setState(patch) {
    Object.assign(_state, patch);
    saveStateToLs(_state);
    emitState();
  }
  function setManualPath(key, value) { _state.manualPath[key] = value; emitState(); }
  function setSalesPath(key, value)  { _state.salesPath[key]  = value; emitState(); }
  function onChange(cb) {
    if (typeof cb === 'function') stateSubscribers.add(cb);
    return () => stateSubscribers.delete(cb);
  }
  function emitState() {
    stateSubscribers.forEach(cb => {
      try { cb(_state); } catch (e) { console.error('state subscriber error', e); }
    });
  }

  function num(v, fallback) {
    if (fallback === undefined) fallback = 0;
    const n = +v;
    return Number.isFinite(n) ? n : fallback;
  }
  function clampMin(v, min) { return Math.max(min, num(v, min)); }

      <div class="byo-grid">
        ${meta.map(m => `
          <div class="byo">
            <label class="byo__label" for="${idPrefix}-${m.key}">${m.label}</label>
            <input class="input mono" id="${idPrefix}-${m.key}" type="number" min="0" step="1000" value="${Math.round(pathState[m.key] || 0)}" />
            <div class="byo__rev" data-byo-rev="${m.key}">Revenue: AED ${fmtAED(pathRevenue(m.key, pathState[m.key] || 0, inp))}</div>
          </div>
        `).join('')}
      </div>
      <div class="byo-status" id="${idPrefix}-status"></div>
    `;
  }

  function wireByo(root, pathStateGetter, shortfallGetter, inpGetter, setter, idPrefix) {
    ['balance', 'spend', 'fx', 'loan'].forEach(key => {
      const el = root.querySelector(`#${idPrefix}-${key}`);
      if (!el) return;
      el.addEventListener('input', e => {
        const aed = clampMin(e.target.value, 0);
        const pathState = pathStateGetter();
        rebalanceApprovalPath(pathState, key, aed, shortfallGetter(), inpGetter());
        ['balance', 'spend', 'fx', 'loan'].forEach(k => setter(k, pathState[k]));
      });
    });
  }

  function renderByoStatus(root, pathState, shortfall, inp, idPrefix) {
    const total = pathTotalRev(pathState, inp);
    const ok = shortfall <= 0 ? true : total >= shortfall * 0.999;
    const el = root.querySelector(`#${idPrefix}-status`);
    if (!el) return;
    el.className = 'byo-status ' + (ok ? 'is-ok' : 'is-bad');
    el.innerHTML = shortfall <= 0
      ? `No revenue gap to close — current relationship already covers the floor.`
      : `Blended revenue <strong>AED ${fmtAED(total)}</strong> vs shortfall <strong>AED ${fmtAED(shortfall)}</strong> — ${ok ? 'shortfall covered' : `still short AED ${fmtAED(Math.max(0, shortfall - total))}`}.`;
  }

  function renderManualPanel() {
    const s = getState();
    const inp = buildEngineInput(s);
    const v = runManualCalculator(inp, num(s.requestedMdrPct, 0));
    const panel = document.getElementById('panel-manual');

    const pathEmpty = ['balance', 'spend', 'fx', 'loan'].every(k => !s.manualPath[k]);
    if (v.shortfall > 0 && pathEmpty) {
      const tmp = {};
      initApprovalPath(tmp, v.shortfall, inp);
      Object.entries(tmp).forEach(([k, val]) => setManualPath(k, val));
    }

    panel.innerHTML = `
      <div class="split">
        <div>${salesContextHTML(s)}</div>
        <div>
          <div class="card">
            <h2 class="card__title">Manual Calculator</h2>
            <p class="card__subtitle">Enter a requested MDR — see whether the relationship economics can support it.</p>

            <div class="field">
              <label class="field__label" for="f-reqMdr">Requested MDR %</label>
              <input class="input input--lg mono" id="f-reqMdr" type="number" min="0" step="0.01" value="${(s.requestedMdrPct * 100).toFixed(2)}" />
              <div class="field__hint">Vintage floor for this profile: ${fmtPct(v.minAllowedMdr)}</div>
            </div>

            <div class="verdict verdict--${v.status}">
              <span class="verdict__dot"></span>
              <div>
                <div class="verdict__label">${v.statusLabel}</div>
                <div class="verdict__detail">Target tier: ${v.targetTier ? v.targetTier.name : '—'}${v.reqBankEntry ? ` · Gate 1 needs AED ${fmtAED(v.reqBankEntry.min)} banking rev` : ''}</div>
              </div>
            </div>

            ${v.belowPolicyFloor ? `<div class="alert">Requested MDR is below the policy floor (${fmtPct(v.minAllowedMdr)}). Manual exception required — sales cannot offer this rate without approval.</div>` : ''}

            <div class="kpis">
              <div class="kpi"><div class="kpi__label">Requested MDR</div><div class="kpi__value">${fmtPct(v.requestedMdrPct)}</div></div>
              <div class="kpi"><div class="kpi__label">PG Cost %</div><div class="kpi__value">${fmtPct(v.pgCostPct)}</div></div>
              <div class="kpi"><div class="kpi__label">PG Revenue</div><div class="kpi__value">AED ${fmtAED(v.pgRev)}</div></div>
              <div class="kpi"><div class="kpi__label">PG-only Net</div><div class="kpi__value ${v.pgOnlyNet < 0 ? 'neg' : ''}">AED ${fmtAED(v.pgOnlyNet)}</div></div>
              <div class="kpi"><div class="kpi__label">Total Relationship Net</div><div class="kpi__value ${v.totalRelNet < 0 ? 'neg' : ''}">AED ${fmtAED(v.totalRelNet)}</div></div>
              <div class="kpi"><div class="kpi__label">Controlling Floor</div><div class="kpi__value">AED ${fmtAED(v.controllingFloor)}</div><div class="kpi__hint">${v.controllingFloorIsMdr ? 'Net MDR bps' : 'Min monthly rev'}</div></div>
              <div class="kpi"><div class="kpi__label">${v.shortfall > 0 ? 'Required Extra Balance' : 'Coverage Buffer'}</div><div class="kpi__value">AED ${fmtAED(v.shortfall > 0 ? v.reqBalance : (v.totalRelNet - v.controllingFloor))}</div></div>
            </div>
          </div>

          <div class="card">
            <h3 class="card__title">PG Economics Waterfall</h3>
            <div class="waterfall">
              <div class="waterfall__row"><span class="waterfall__label">MDR revenue</span><span class="waterfall__value">AED ${fmtAED(v.requestedMdrPct * v.pgYearVol)}</span></div>
              <div class="waterfall__row"><span class="waterfall__label">+ E-com per-txn fee</span><span class="waterfall__value">AED ${fmtAED(v.engine.aovFeeAnnual)}</span></div>
              <div class="waterfall__row"><span class="waterfall__label">− PG cost stack</span><span class="waterfall__value neg">AED ${fmtAED(v.engine.pgCostAnnual)}</span></div>
              <div class="waterfall__row"><span class="waterfall__label">PG-only net</span><span class="waterfall__value ${v.pgOnlyNet < 0 ? 'neg' : ''}">AED ${fmtAED(v.pgOnlyNet)}</span></div>
            </div>
          </div>

          <div class="card">
            <h3 class="card__title">Relationship Coverage Waterfall</h3>
            <div class="waterfall">
              <div class="waterfall__row"><span class="waterfall__label">PG-only net</span><span class="waterfall__value ${v.pgOnlyNet < 0 ? 'neg' : ''}">AED ${fmtAED(v.pgOnlyNet)}</span></div>
              <div class="waterfall__row"><span class="waterfall__label">+ Banking revenue (NIM · FX · spend · loan yr-1)</span><span class="waterfall__value">AED ${fmtAED(v.bankingRev)}</span></div>
              <div class="waterfall__row"><span class="waterfall__label">vs Controlling floor</span><span class="waterfall__value">AED ${fmtAED(v.controllingFloor)}</span></div>
              <div class="waterfall__row"><span class="waterfall__label">Verdict</span><span class="waterfall__value">${v.relCovers ? 'Covered' : 'Short by AED ' + fmtAED(v.shortfall)}</span></div>
            </div>
          </div>

          <div class="card">
            <h3 class="card__title">Approval Paths (Standalone)</h3>
            <p class="card__subtitle">Each path closes the entire revenue gap on its own.</p>
            ${standalonePathsHTML(v.shortfall, inp)}
            ${loanMatrixHTML(v.shortfall, inp)}
          </div>

          <div class="card">
            <h3 class="card__title">Build-Your-Own Approval Path</h3>
            <p class="card__subtitle">AED-based — change one and the others rebalance evenly across active drivers.</p>
            ${byoHTML(s.manualPath, v.shortfall, inp, 'm-byo')}
          </div>

          <div class="pitch">
            <div class="pitch__title">Sales Pitch</div>
            <div class="pitch__body">${pitchText(v)}</div>
          </div>
        </div>
      </div>
    `;

    wireSalesContext(panel);

    panel.querySelector('#f-reqMdr').addEventListener('input', e => {
      const pct = clampMin(e.target.value, 0) / 100;
      setState({ requestedMdrPct: pct });
      ['balance', 'spend', 'fx', 'loan'].forEach(k => setManualPath(k, 0));
    });

    wireByo(
      panel,
      () => getState().manualPath,
      () => {
        const cur = getState();
        const verdict = runManualCalculator(buildEngineInput(cur), num(cur.requestedMdrPct, 0));
        return verdict.shortfall;
      },
      () => buildEngineInput(getState()),
      setManualPath,
      'm-byo',
    );
    renderByoStatus(panel, s.manualPath, v.shortfall, inp, 'm-byo');
  }

  function renderSalesPanel() {

    const desiredMdr = num(s.desiredMdrPct, 0);

    const pathEmpty = ['balance', 'spend', 'fx', 'loan'].every(k => !s.salesPath[k]);
    if (v.shortfall > 0 && pathEmpty) {
      const tmp = {};
      initApprovalPath(tmp, v.shortfall, inp);
      Object.entries(tmp).forEach(([k, val]) => setSalesPath(k, val));
    }

    panel.innerHTML = `
      <div class="split">
        <div>${salesContextHTML(s)}</div>
        <div>
          <div class="card">
            <h2 class="card__title">Sales Calculator (Reverse)</h2>
            <p class="card__subtitle">Enter the MDR you want to offer — see the minimum relationship that supports it.</p>

            <div class="field">
              <label class="field__label" for="f-desiredMdr">Desired MDR to Offer %</label>
              <input class="input input--lg mono" id="f-desiredMdr" type="number" min="0" step="0.01" value="${(desiredMdr * 100).toFixed(2)}" />
              <div class="field__hint">Vintage floor: ${fmtPct(v.minAllowedMdr)}</div>
            </div>

            <div class="verdict verdict--${v.status}">
              <span class="verdict__dot"></span>
              <div>
                <div class="verdict__label">${v.statusLabel}</div>
                <div class="verdict__detail">Target tier: ${v.targetTier ? v.targetTier.name : '—'}${v.reqBankEntry ? ` · Gate 1 needs AED ${fmtAED(v.reqBankEntry.min)} banking rev` : ''}</div>
              </div>
            </div>

            ${v.belowPolicyFloor ? `<div class="alert">Desired MDR is below the policy floor (${fmtPct(v.minAllowedMdr)}). Manual exception required.</div>` : ''}

            <div class="kpis">
              <div class="kpi"><div class="kpi__label">Desired MDR</div><div class="kpi__value">${fmtPct(v.requestedMdrPct)}</div></div>
              <div class="kpi"><div class="kpi__label">PG Revenue at MDR</div><div class="kpi__value">AED ${fmtAED(v.pgRev)}</div></div>
              <div class="kpi"><div class="kpi__label">PG-only Net</div><div class="kpi__value ${v.pgOnlyNet < 0 ? 'neg' : ''}">AED ${fmtAED(v.pgOnlyNet)}</div></div>
              <div class="kpi"><div class="kpi__label">Current Banking Rev</div><div class="kpi__value">AED ${fmtAED(v.bankingRev)}</div></div>
              <div class="kpi"><div class="kpi__label">Floor</div><div class="kpi__value">AED ${fmtAED(v.controllingFloor)}</div></div>
              <div class="kpi"><div class="kpi__label">Revenue Shortfall</div><div class="kpi__value ${v.shortfall > 0 ? 'neg' : ''}">AED ${fmtAED(v.shortfall)}</div></div>
            </div>
          </div>

          <div class="card">
            <h3 class="card__title">Minimum Relationship — Standalone Paths</h3>
            <p class="card__subtitle">Each card shows the AED in a single driver that would close the gap alone.</p>
            ${standalonePathsHTML(v.shortfall, inp)}
            ${loanMatrixHTML(v.shortfall, inp)}
          </div>

          <div class="card">
            <h3 class="card__title">Build-Your-Own Approval Path</h3>
            <p class="card__subtitle">Distribute the shortfall across multiple drivers. AED-based rebalancing.</p>
            ${byoHTML(s.salesPath, v.shortfall, inp, 's-byo')}

          <div class="pitch">

            <div class="pitch__body">${pitchText(v)}</div>
          </div>
        </div>
      </div>
    `;

    wireSalesContext(panel);
    panel.querySelector('#f-desiredMdr').addEventListener('input', e => {
      const pct = clampMin(e.target.value, 0) / 100;

    wireByo(
      panel,
      () => getState().salesPath,
      () => {
        const cur = getState();
        const verdict = runManualCalculator(buildEngineInput(cur), num(cur.desiredMdrPct, 0));
        return verdict.shortfall;
      },
      () => buildEngineInput(getState()),
      setSalesPath,
      's-byo',
    );
    renderByoStatus(panel, s.salesPath, v.shortfall, inp, 's-byo');

  function pctInput(value, onCh) {
    const input = document.createElement('input');
    input.className = 'input mono';
    input.type = 'number';
    input.step = '0.0001';
    input.value = (value * 100).toFixed(4);
    input.addEventListener('input', e => {
      const pct = num(e.target.value, 0) / 100;
      onCh(pct);
    });
    return input;
  }

  function numInput(value, onCh, step) {
    const input = document.createElement('input');
    input.className = 'input mono';
    input.type = 'number';
    input.step = String(step || 1);
    input.value = value;
    input.addEventListener('input', e => onCh(num(e.target.value, 0)));
    return input;
  }

  function renderBackendPanel() {
    const panel = document.getElementById('panel-backend');

    panel.innerHTML = `
      <div class="card">
        <div class="toolbar">
          <div>
            <h2 class="card__title">Backend Assumptions</h2>
            <p class="card__subtitle">Edit any value — calculators re-render live across all tabs.</p>
          </div>
          <button class="btn btn--ghost" id="backend-reset">Reset to defaults</button>
        </div>

        <div class="backend-section">
          <div class="section-label">MCC Interchange (debit / credit)</div>
          <table class="backend-table"><thead><tr><th>Industry</th><th>Debit %</th><th>Credit %</th></tr></thead><tbody id="t-interchange"></tbody></table>
        </div>

        <div class="backend-section">
          <div class="section-label">Customer markup (per MCC)</div>
          <table class="backend-table"><thead><tr><th>Industry</th><th>Markup %</th></tr></thead><tbody id="t-markup"></tbody></table>
        </div>

        <div class="backend-section">
          <div class="section-label">Tier MDR matrix (per MCC × tier)</div>
          <table class="backend-table"><thead><tr><th>Industry</th>${tiers.map(t => `<th>${t.name} %</th>`).join('')}</tr></thead><tbody id="t-tierMdr"></tbody></table>
        </div>

        <div class="backend-section">
          <div class="section-label">Banking yields</div>
          <table class="backend-table"><thead><tr><th>Driver</th><th>Rate %</th></tr></thead><tbody id="t-yields"></tbody></table>
        </div>

        <div class="backend-section">
          <div class="section-label">PG cost stack</div>
          <table class="backend-table"><thead><tr><th>Component</th><th>Value</th></tr></thead><tbody id="t-costs"></tbody></table>
        </div>

        <div class="backend-section">
          <div class="section-label">E-com per-txn fee brackets (AED)</div>
          <table class="backend-table"><thead><tr><th>Bracket</th><th>Fee (AED)</th></tr></thead><tbody id="t-ecom"></tbody></table>
        </div>

        <div class="backend-section">
          <div class="section-label">Risk adjustment (additive on MDR)</div>
          <table class="backend-table"><thead><tr><th>Risk</th><th>Adj %</th></tr></thead><tbody id="t-risk"></tbody></table>
        </div>

        <div class="backend-section">
          <div class="section-label">Banking revenue → tier cap (Gate 1)</div>
          <table class="backend-table"><thead><tr><th>Label</th><th>Min AED</th><th>Cap</th></tr></thead><tbody id="t-banking"></tbody></table>
        </div>

        <div class="backend-section">
          <div class="section-label">PG volume → tier cap (Gate 3)</div>
          <table class="backend-table"><thead><tr><th>Label</th><th>Min AED</th><th>Cap</th></tr></thead><tbody id="t-pgScale"></tbody></table>
        </div>

        <div class="backend-section">
          <div class="section-label">Commercial floors</div>
          <table class="backend-table"><thead><tr><th>Floor</th><th>Value</th></tr></thead><tbody id="t-floors"></tbody></table>
        </div>
      </div>
    `;

    const tInter = panel.querySelector('#t-interchange');
    Object.entries(industryInterchange).forEach(([k, v]) => {
      const tr = document.createElement('tr');
      const tdLabel = document.createElement('td'); tdLabel.textContent = v.label;
      const tdD = document.createElement('td'); tdD.appendChild(pctInput(v.debit,  x => { industryInterchange[k].debit  = x; notifyMcc(); }));
      const tdC = document.createElement('td'); tdC.appendChild(pctInput(v.credit, x => { industryInterchange[k].credit = x; notifyMcc(); }));
      tr.append(tdLabel, tdD, tdC);
      tInter.appendChild(tr);
    });

    const tMark = panel.querySelector('#t-markup');
    Object.entries(mccMarkupTable).forEach(([k, v]) => {
      const tr = document.createElement('tr');
      const tdLabel = document.createElement('td'); tdLabel.textContent = (industryInterchange[k] && industryInterchange[k].label) || k;
      const tdV = document.createElement('td'); tdV.appendChild(pctInput(v, x => { mccMarkupTable[k] = x; notifyMcc(); }));
      tr.append(tdLabel, tdV);
      tMark.appendChild(tr);
    });

    const tTierMdr = panel.querySelector('#t-tierMdr');
    Object.entries(mccTierMDR).forEach(([k, arr]) => {
      const tr = document.createElement('tr');
      const tdLabel = document.createElement('td'); tdLabel.textContent = (industryInterchange[k] && industryInterchange[k].label) || k;
      tr.appendChild(tdLabel);
      arr.forEach((val, i) => {
        const td = document.createElement('td');
        td.appendChild(pctInput(val, x => { mccTierMDR[k][i] = x; notifyMcc(); }));
        tr.appendChild(td);
      });
      tTierMdr.appendChild(tr);
    });

    const tYields = panel.querySelector('#t-yields');
    const yieldLabels = { rBal: 'Balance NIM (rBal)', rXb: 'Cross-border take (rXb)', rDeb: 'Spend interchange (rDeb)', rLoan: 'Loan rate (rLoan)' };
    Object.entries(defaultYields).forEach(([k, v]) => {
      const tr = document.createElement('tr');
      const tdLabel = document.createElement('td'); tdLabel.textContent = yieldLabels[k] || k;
      const tdV = document.createElement('td'); tdV.appendChild(pctInput(v, x => { defaultYields[k] = x; notifyMcc(); }));
      tr.append(tdLabel, tdV);
      tYields.appendChild(tr);
    });

    const tCosts = panel.querySelector('#t-costs');
    const costRows = [
      { key: 'pineLabs',  label: 'Pine Labs variable %',  kind: 'pct' },
      { key: 'fixedCost', label: 'Fixed cost (AED / txn)', kind: 'num', step: 0.01 },
      { key: 'debitMix',  label: 'Default debit mix %',   kind: 'pct' },
    ];
    costRows.forEach(row => {
      const tr = document.createElement('tr');
      const tdLabel = document.createElement('td'); tdLabel.textContent = row.label;
      const tdV = document.createElement('td');
      tdV.appendChild(row.kind === 'pct'
        ? pctInput(defaultCosts[row.key], x => { defaultCosts[row.key] = x; notifyMcc(); })
        : numInput(defaultCosts[row.key], x => { defaultCosts[row.key] = x; notifyMcc(); }, row.step));
      tr.append(tdLabel, tdV);
      tCosts.appendChild(tr);
    });

    const tEcom = panel.querySelector('#t-ecom');
    ['0 – 200', '200 – 500', '500 – 1,000', '1,000+'].forEach((label, i) => {
      const tr = document.createElement('tr');
      const tdL = document.createElement('td'); tdL.textContent = label;
      const tdV = document.createElement('td');
      tdV.appendChild(numInput(CMC_FEE_DEFAULTS[i], x => { CMC_FEE_DEFAULTS[i] = x; notifyMcc(); }, 0.05));
      tr.append(tdL, tdV);
      tEcom.appendChild(tr);
    });

    const tRisk = panel.querySelector('#t-risk');
    ['low', 'med', 'high'].forEach(k => {
      const tr = document.createElement('tr');
      const tdL = document.createElement('td'); tdL.textContent = { low: 'Low', med: 'Medium', high: 'High' }[k];
      const tdV = document.createElement('td'); tdV.appendChild(pctInput(riskAdj[k], x => { riskAdj[k] = x; notifyMcc(); }));
      tr.append(tdL, tdV);
      tRisk.appendChild(tr);
    });

    const tBanking = panel.querySelector('#t-banking');
    bankingRevTiers.forEach((b, i) => {
      const tr = document.createElement('tr');
      const tdL = document.createElement('td'); tdL.textContent = b.label;
      const tdMin = document.createElement('td'); tdMin.appendChild(numInput(b.min, x => { bankingRevTiers[i].min = x; notifyMcc(); }, 1000));
      const tdCap = document.createElement('td'); tdCap.textContent = b.cap;
      tr.append(tdL, tdMin, tdCap);
      tBanking.appendChild(tr);
    });

    const tPg = panel.querySelector('#t-pgScale');
    pgScaleTiers.forEach((p, i) => {
      const tr = document.createElement('tr');
      const tdL = document.createElement('td'); tdL.textContent = p.label;
      const tdMin = document.createElement('td'); tdMin.appendChild(numInput(p.min, x => { pgScaleTiers[i].min = x; notifyMcc(); }, 10000));
      const tdCap = document.createElement('td'); tdCap.textContent = p.cap;
      tr.append(tdL, tdMin, tdCap);
      tPg.appendChild(tr);
    });

    const tFloors = panel.querySelector('#t-floors');
    const floorRows = [
      { key: 'netMdrFloorBps', label: 'Net MDR floor (bps)', step: 1 },
      { key: 'minMonthlyRev',  label: 'Min monthly relationship rev (AED)', step: 100 },
    ];
    floorRows.forEach(row => {
      const tr = document.createElement('tr');
      const tdL = document.createElement('td'); tdL.textContent = row.label;
      const tdV = document.createElement('td');
      tdV.appendChild(numInput(defaultFloors[row.key], x => { defaultFloors[row.key] = x; notifyMcc(); }, row.step));
      tr.append(tdL, tdV);
      tFloors.appendChild(tr);
    });

    panel.querySelector('#backend-reset').addEventListener('click', () => {
      resetMccDefaults();
    });
  }

  function render() {
    showActiveTab();
    const s = getState();
    if (s.activeTab === 'manual')  renderManualPanel();
    if (s.activeTab === 'sales')   renderSalesPanel();
    if (s.activeTab === 'backend') renderBackendPanel();
  }

  mountShell();
  render();
  onChange(render);
  subscribeMcc(render);

  window.__wio = { getState, runManualCalculator, calcTierRevGap };
})();
  </script>

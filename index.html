<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wio Pay Sales Calculator</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <div class="brand">
        <span class="brand__mark">W</span>
        <span class="brand__title">Wio Pay Sales Calculator</span>
      </div>
      <nav class="tabs" role="tablist" aria-label="Calculator views">
        <button class="tab is-active" role="tab" data-tab="manual" aria-selected="true">Manual Calculator</button>
        <button class="tab" role="tab" data-tab="sales" aria-selected="false">Sales Calculator</button>
        <button class="tab" role="tab" data-tab="backend" aria-selected="false">Backend Assumptions</button>
      </nav>
    </div>
  </header>

  <main class="app-main" id="app">
    <!-- panels are populated by main.js -->
  </main>

  <footer class="app-footer">
    <span>Internal use only. Pricing logic from <code>reference/LOGIC_EXTRACT.md</code>.</span>
  </footer>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
